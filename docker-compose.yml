version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    env_file: .env
    volumes:
      - /mnt/mysql-data:/var/lib/mysql
    networks:
      - wp_network

  wordpress:
    depends_on:
      - db
    image: wordpress:latest
    container_name: wordpress_site
    restart: always
    ports:
      - "80:80"
    env_file: .env
    networks:
      - wp_network

networks:
  wp_network:
    driver: bridge
